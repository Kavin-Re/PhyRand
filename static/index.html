<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Vault | Web Portal</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #c9d1d9; --accent: #238636; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 2rem; border-radius: 8px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: white; }
        p { font-size: 0.9rem; color: #8b949e; margin-bottom: 1.5rem; }
        input { width: 100%; padding: 12px; margin-bottom: 1rem; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: white; font-family: monospace; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        button:hover { background: #2ea043; }
        #status { margin-top: 1.5rem; padding: 1rem; border-radius: 6px; display: none; font-size: 0.85rem; word-break: break-all; }
        .success { background: rgba(35, 134, 54, 0.15); border: 1px solid var(--accent); color: #3fb950; }
        .error { background: rgba(248, 81, 73, 0.15); border: 1px solid #f85149; color: #f85149; }
    </style>
</head>
<body>

<div class="card">
    <h1>🔒 Quantum Unlocker</h1>
    <p>Hardware-authenticated key retrieval via STM32 entropy.</p>
    
    <label>File Identifier</label>
    <input type="text" id="fileId" placeholder="E.g. 4E45CA" autocomplete="off">
    
    <label>Access Token</label>
    <input type="password" id="apiToken" placeholder="Enter Master Token" autocomplete="off">
    
    <button onclick="handleRequest()">Request Key</button>

    <div id="status"></div>
</div>

<script>
    async function handleRequest() {
        const fileId = document.getElementById('fileId').value.trim().toUpperCase();
        const token = document.getElementById('apiToken').value.trim();
        const statusBox = document.getElementById('status');

        if (!fileId || !token) { alert("Please fill in both fields."); return; }

        statusBox.style.display = 'block';
        statusBox.className = '';
        statusBox.innerText = "Querying Quantum Authority...";

        try {
            const response = await fetch(`/release/${fileId}`, {
                headers: { 'x-api-token': token }
            });
            const data = await response.json();

            if (response.ok) {
                statusBox.className = 'success';
                statusBox.innerHTML = `<strong>Handshake Verified</strong><br><br>Your Key:<br><code style="background:#000; padding:4px;">${data.key}</code>`;
            } else {
                statusBox.className = 'error';
                statusBox.innerText = data.detail || "Error: Unauthorized access.";
            }
        } catch (err) {
            statusBox.className = 'error';
            statusBox.innerText = "Connection failed. Ensure the server is online.";
        }
    }
</script>

</body>
</html>
